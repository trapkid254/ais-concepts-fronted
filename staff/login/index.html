<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | AIS Concepts</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="../../vendor/font-awesome.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-secondary);
            padding: 20px;
        }
        .auth-wrap { max-width: 400px; width: 100%; }
        .auth-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 40px 30px; 
            box-shadow: 0 10px 30px var(--shadow); 
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .auth-card h1 { 
            font-size: 1.5rem; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-primary); 
        }
        .auth-card .sub { 
            color: var(--text-tertiary); 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
        }
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 1rem; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0f766e;
        }
        .password-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }
        .password-input-group input {
            flex: 1;
            padding-right: 40px;
        }
        .toggle-password-btn {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 1.1rem;
            padding: 4px 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s ease;
        }
        .toggle-password-btn:hover {
            color: #0f766e;
        }
        .btn-auth { 
            width: 100%; 
            padding: 14px; 
            background: #0f766e; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        .btn-auth:hover { 
            background: #0d9488; 
        }
        
        @media (max-width: 480px) {
            .auth-card { 
                padding: 30px 20px; 
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <div class="auth-card">
                <h1>Staff Portal</h1>
                <p class="sub">Enter your credentials to login</p>
                
                <form id="staffLoginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-input-group">
                            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                            <button type="button" class="toggle-password-btn" onclick="togglePassword('password')">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    <script src="../../api-client.js"></script>
    <script>
        function togglePassword(inputId) {
            const passwordInput = document.getElementById(inputId);
            const btn = event.target.closest('.toggle-password-btn');
            const icon = btn.querySelector('i');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        (function() {
            const form = document.getElementById('staffLoginForm');
            const API_BASE = window.API_BASE || '';
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password, portalType: 'staff' })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.user && result.user.role === 'staff') {
                        sessionStorage.setItem('authToken', result.token);
                        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
                        window.location.href = '../dashboard/';
                    } else {
                        alert('Invalid credentials or not authorized as staff');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
