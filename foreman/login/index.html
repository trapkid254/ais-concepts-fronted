<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foreman Login | AIS Concepts</title>
    <link rel="icon" type="image/png" href="../../images/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../portal-styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <a class="back-home" href="../../index.html"><i class="fas fa-arrow-left"></i> Back to home</a>
            <div class="auth-card">
                <div class="auth-card-watermark" aria-hidden="true"></div>
                <h1>Foreman Portal</h1>
                <p class="sub">Login to manage your projects and workers</p>
                
                <form id="foremanLoginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required autocomplete="email">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password">
                    </div>
                    <div class="form-group form-group-action">
                        <button type="submit" class="btn-auth">Login as Foreman</button>
                    </div>
                </form>
                
                <div class="auth-links">
                    <a href="../staff/login/">Staff Login</a>
                    <a href="../../index.html">Back to home</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    <script src="../../api-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('foremanLoginForm');
            const API_BASE = window.API_BASE || '';
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const response = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email, password })
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.user && result.user.role === 'foreman') {
                        // Store auth data
                        sessionStorage.setItem('authToken', result.token);
                        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
                        
                        // Redirect to foreman portal
                        window.location.href = '../portal/';
                    } else {
                        alert('Invalid credentials or not authorized as foreman');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
