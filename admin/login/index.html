<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | AIS Concepts</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-secondary);
            padding: 20px;
        }
        .auth-wrap { max-width: 400px; width: 100%; }
        .auth-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 40px 30px; 
            box-shadow: 0 10px 30px var(--shadow); 
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .auth-card h1 { 
            font-size: 1.5rem; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-primary); 
        }
        .auth-card .sub { 
            color: var(--text-tertiary); 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
        }
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 1rem; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0f766e;
        }
        .btn-auth { 
            width: 100%; 
            padding: 14px; 
            background: #0f766e; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        .btn-auth:hover { 
            background: #0d9488; 
        }
        
        @media (max-width: 480px) {
            .auth-card { 
                padding: 30px 20px; 
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <div class="auth-card">
                <h1>Admin Portal</h1>
                <p class="sub">Enter your credentials to login</p>
                
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label for="identifier">Email or Username</label>
                        <input type="text" id="identifier" name="identifier" required autocomplete="username" placeholder="Enter your email or username">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn-auth">Login</button>
                </form>
            </div>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    <script src="../../api-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('adminLoginForm');
            const API_BASE = window.API_BASE || '';
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const identifier = document.getElementById('identifier').value;
                const password = document.getElementById('password').value;
                
                // Check if identifier is email or username
                const isEmail = identifier.includes('@');
                const loginData = {
                    password: password,
                    [isEmail ? 'email' : 'username']: identifier
                };
                
                try {
                    const response = await fetch(`${API_BASE}/api/auth/login`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(loginData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok && result.user && result.user.role === 'admin') {
                        sessionStorage.setItem('authToken', result.token);
                        sessionStorage.setItem('currentUser', JSON.stringify(result.user));
                        window.location.href = '../dashboard/';
                    } else {
                        alert('Invalid credentials or not authorized as admin');
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    alert('Login failed. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
