<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client login | AIS Concepts</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page { min-height: 100vh; padding: 100px 16px 40px; background: linear-gradient(160deg, #f0fdfa 0%, #f9fafb 45%, #fff 100%); }
        .auth-wrap { max-width: 440px; margin: 0 auto; position: relative; }
        .auth-card { position: relative; background: #fff; border-radius: 16px; padding: 32px 28px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); border: 1px solid rgba(15, 118, 110, 0.12); overflow: hidden; }
        .auth-card-watermark {
            position: absolute; inset: 0; pointer-events: none; opacity: 0.06;
            background: url('../images/logo.png') center center / min(280px, 70%) no-repeat;
        }
        .auth-card h1 { position: relative; font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: #0f172a; }
        .auth-card .sub { position: relative; color: #6b7280; font-size: 0.95rem; margin-bottom: 24px; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; position: relative; }
        .auth-tabs button { flex: 1; padding: 10px; border: 1px solid #e5e7eb; background: #f9fafb; border-radius: 8px; cursor: pointer; font-weight: 500; color: #374151; }
        .auth-tabs button.active { background: #0f766e; color: #fff; border-color: #0f766e; }
        .auth-panel { display: none; position: relative; }
        .auth-panel.active { display: block; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #374151; margin-bottom: 6px; }
        .pw-input-wrap { position: relative; display: flex; align-items: center; }
        .pw-input-wrap input { flex: 1; padding: 12px 44px 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 1rem; }
        .pw-toggle { position: absolute; right: 0; top: 0; bottom: 0; width: 44px; border: none; background: transparent; cursor: pointer; color: #6b7280; }
        .pw-toggle:hover { color: #0f766e; }
        .form-group input:not(.pw-input-wrap input) { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 1rem; }
        .pw-meter { margin-top: 8px; font-size: 0.75rem; color: #6b7280; }
        .pw-meter div { display: flex; align-items: center; gap: 6px; margin: 3px 0; }
        .pw-meter [data-rule] { opacity: 0.45; }
        .pw-meter [data-rule].met { opacity: 1; color: #0f766e; }
        .pw-meter [data-rule].met i { color: #0f766e; }
        .btn-auth { width: 100%; padding: 14px; background: #0f766e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-auth:hover { background: #0d9488; }
        .btn-auth:disabled { opacity: 0.45; cursor: not-allowed; }
        .auth-links { margin-top: 20px; font-size: 0.9rem; color: #6b7280; text-align: center; position: relative; }
        .auth-links a { color: #0f766e; font-weight: 500; }
        .back-home { display: inline-block; margin-bottom: 20px; color: #0f766e; text-decoration: none; font-size: 0.95rem; }
        .back-home:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <a class="back-home" href="../index.html"><i class="fas fa-arrow-left"></i> Back to home</a>
            <div class="auth-card">
                <div class="auth-card-watermark" aria-hidden="true"></div>
                <h1>Client portal</h1>
                <p class="sub">Sign in or register — an admin will approve new accounts before first login.</p>
                <div class="auth-tabs">
                    <button type="button" class="active" id="tabLogin">Sign in</button>
                    <button type="button" id="tabRegister">Register</button>
                </div>
                <div id="panelLogin" class="auth-panel active">
                    <form id="clientLoginForm">
                        <div class="form-group">
                            <label for="cEmail">Email or Phone</label>
                            <input type="text" id="cEmail" required autocomplete="username" placeholder="Email or phone number">
                        </div>
                        <div class="form-group">
                            <label for="cPassword">Password</label>
                            <div class="pw-input-wrap">
                                <input class="pw-field" type="password" id="cPassword" required autocomplete="current-password">
                                <button type="button" class="pw-toggle" id="cPwToggle" aria-label="Show password"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                        <button type="submit" class="btn-auth">Sign in</button>
                    </form>
                </div>
                <div id="panelRegister" class="auth-panel">
                    <form id="clientRegisterForm">
                        <div class="form-group">
                            <label for="rName">Full name</label>
                            <input type="text" id="rName" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="rPhone">Phone Number *</label>
                            <input type="tel" id="rPhone" required placeholder="+254 XXX XXX XXX">
                        </div>
                        <div class="form-group">
                            <label for="rEmail">Email (optional)</label>
                            <input type="email" id="rEmail" placeholder="you@example.com">
                        </div>
                        <div class="form-group">
                            <label for="rPassword">Password</label>
                            <div class="pw-input-wrap">
                                <input class="pw-field" type="password" id="rPassword" required maxlength="16" autocomplete="new-password">
                                <button type="button" class="pw-toggle" id="rPwToggle" aria-label="Show password"><i class="fas fa-eye"></i></button>
                            </div>
                            <div class="pw-meter" id="rPwMeter">
                                <div data-rule="len"><i class="fas fa-circle"></i> 8–16 characters</div>
                                <div data-rule="lower"><i class="fas fa-circle"></i> Lowercase letter</div>
                                <div data-rule="upper"><i class="fas fa-circle"></i> Uppercase letter</div>
                                <div data-rule="digit"><i class="fas fa-circle"></i> Number</div>
                                <div data-rule="special"><i class="fas fa-circle"></i> Special character</div>
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="rPassword2">Confirm password</label>
                            <div class="pw-input-wrap">
                                <input class="pw-field" type="password" id="rPassword2" required maxlength="16" autocomplete="new-password">
                                <button type="button" class="pw-toggle" id="rPw2Toggle" aria-label="Show password"><i class="fas fa-eye"></i></button>
                            </div>
                        </div>
                        <button type="submit" class="btn-auth" id="rSubmit">Submit registration</button>
                    </form>
                </div>
                <div class="auth-links">
                    <a href="../staff/login.html">Admin / employee login</a>
                </div>
            </div>
        </div>
    </div>
    <script src="../api-config.js"></script>
    <script src="../api-client.js"></script>
    <script>
        (function () {
        var API_BASE = window.API_BASE || '';
        if (new URLSearchParams(window.location.search).get('pending') === '1') {
            alert('Your account is still pending approval. You will be able to sign in once an administrator approves it.');
        }
        AisPassword.bindToggle(document.getElementById('cPwToggle'), document.getElementById('cPassword'));
        AisPassword.bindToggle(document.getElementById('rPwToggle'), document.getElementById('rPassword'));
        AisPassword.bindToggle(document.getElementById('rPw2Toggle'), document.getElementById('rPassword2'));

        var rPw = document.getElementById('rPassword');
        var meter = document.getElementById('rPwMeter');
        rPw.addEventListener('input', function () { AisPassword.updateMeter(meter, rPw.value); });

        document.getElementById('tabLogin').addEventListener('click', function () {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('panelLogin').classList.add('active');
            document.getElementById('panelRegister').classList.remove('active');
        });
        document.getElementById('tabRegister').addEventListener('click', function () {
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('panelRegister').classList.add('active');
            document.getElementById('panelLogin').classList.remove('active');
        });
        document.getElementById('clientLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var email = document.getElementById('cEmail').value.trim();
            var password = document.getElementById('cPassword').value;
            fetch(API_BASE + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, username: email, password: password, portalType: 'client' })
            })
                .then(function (r) {
                    return r.json().then(function (data) {
                        if (!r.ok) throw data;
                        return data;
                    });
                })
                .then(function (data) {
                    sessionStorage.setItem('authToken', data.token);
                    sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                })
                .catch(function (err) {
                    if (err && err.error === 'account_pending') {
                        alert(err.message || 'Your account is pending approval.');
                    } else {
                        alert((err && err.error) || 'Could not sign in. Please check your credentials.');
                    }
                });
        });
        document.getElementById('clientRegisterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var p1 = document.getElementById('rPassword').value;
            var p2 = document.getElementById('rPassword2').value;
            if (p1 !== p2) {
                alert('Passwords do not match.');
                return;
            }
            if (!AisPassword.allMet(p1)) {
                alert('Password must meet all requirements (8–16 characters, upper, lower, number, special).');
                return;
            }
            var phone = document.getElementById('rPhone').value.trim();
            var email = document.getElementById('rEmail').value.trim();
            
            // Validate phone number format
            if (!phone || phone.length < 10) {
                alert('Please enter a valid phone number.');
                return;
            }
            
            fetch(API_BASE + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('rName').value.trim(),
                    email: email || null, // Send null if email is empty
                    phone: phone,
                    password: p1
                })
            })
                .then(function (r) {
                    return r.json().then(function (data) {
                        if (!r.ok) throw new Error(data.error || 'Registration failed');
                        return data;
                    });
                })
                .then(function (data) {
                    alert(data.message || 'Registration submitted.');
                    document.getElementById('tabLogin').click();
                })
                .catch(function (err) {
                    alert(err.message || 'Could not register.');
                });
        });
    })();
    </script>
</body>
</html>
