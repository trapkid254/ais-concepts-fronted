<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client login | AIS Concepts</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page { min-height: 100vh; padding: 100px 20px 40px; background: linear-gradient(160deg, #f0fdfa 0%, #f9fafb 45%, #fff 100%); }
        .auth-wrap { max-width: 440px; margin: 0 auto; }
        .auth-card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 20px 50px rgba(15, 23, 42, 0.08); border: 1px solid rgba(15, 118, 110, 0.12); }
        .auth-card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 8px; color: #0f172a; }
        .auth-card .sub { color: #6b7280; font-size: 0.95rem; margin-bottom: 24px; }
        .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .auth-tabs button { flex: 1; padding: 10px; border: 1px solid #e5e7eb; background: #f9fafb; border-radius: 8px; cursor: pointer; font-weight: 500; color: #374151; }
        .auth-tabs button.active { background: #0f766e; color: #fff; border-color: #0f766e; }
        .auth-panel { display: none; }
        .auth-panel.active { display: block; }
        .form-group { margin-bottom: 16px; text-align: left; }
        .form-group label { display: block; font-size: 0.85rem; color: #374151; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 14px; border: 1px solid #e5e7eb; border-radius: 8px; font-size: 1rem; }
        .btn-auth { width: 100%; padding: 14px; background: #0f766e; color: #fff; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        .btn-auth:hover { background: #0d9488; }
        .auth-links { margin-top: 20px; font-size: 0.9rem; color: #6b7280; text-align: center; }
        .auth-links a { color: #0f766e; font-weight: 500; }
        .back-home { display: inline-block; margin-bottom: 20px; color: #0f766e; text-decoration: none; font-size: 0.95rem; }
        .back-home:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <a class="back-home" href="../index.html"><i class="fas fa-arrow-left"></i> Back to home</a>
            <div class="auth-card">
                <h1>Client portal</h1>
                <p class="sub">Sign in to your project dashboard, or register — an admin will approve new accounts before first login.</p>
                <div class="auth-tabs">
                    <button type="button" class="active" id="tabLogin">Sign in</button>
                    <button type="button" id="tabRegister">Register</button>
                </div>
                <div id="panelLogin" class="auth-panel active">
                    <form id="clientLoginForm">
                        <div class="form-group">
                            <label for="cEmail">Email</label>
                            <input type="email" id="cEmail" required autocomplete="username" placeholder="you@example.com">
                        </div>
                        <div class="form-group">
                            <label for="cPassword">Password</label>
                            <input type="password" id="cPassword" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn-auth">Sign in</button>
                    </form>
                </div>
                <div id="panelRegister" class="auth-panel">
                    <form id="clientRegisterForm">
                        <div class="form-group">
                            <label for="rName">Full name</label>
                            <input type="text" id="rName" required placeholder="Your name">
                        </div>
                        <div class="form-group">
                            <label for="rEmail">Email</label>
                            <input type="email" id="rEmail" required placeholder="you@example.com">
                        </div>
                        <div class="form-group">
                            <label for="rPassword">Password</label>
                            <input type="password" id="rPassword" required minlength="6">
                        </div>
                        <div class="form-group">
                            <label for="rPassword2">Confirm password</label>
                            <input type="password" id="rPassword2" required minlength="6">
                        </div>
                        <button type="submit" class="btn-auth">Submit registration</button>
                    </form>
                </div>
                <div class="auth-links">
                    <a href="../staff/login.html">Admin / employee login</a>
                </div>
            </div>
        </div>
    </div>
    <script src="../api-config.js"></script>
    <script src="../api-client.js"></script>
    <script>
    (function () {
        var API_BASE = window.API_BASE || '';
        if (new URLSearchParams(window.location.search).get('pending') === '1') {
            alert('Your account is still pending approval. You will be able to sign in once an administrator approves it.');
        }
        document.getElementById('tabLogin').addEventListener('click', function () {
            document.getElementById('tabLogin').classList.add('active');
            document.getElementById('tabRegister').classList.remove('active');
            document.getElementById('panelLogin').classList.add('active');
            document.getElementById('panelRegister').classList.remove('active');
        });
        document.getElementById('tabRegister').addEventListener('click', function () {
            document.getElementById('tabRegister').classList.add('active');
            document.getElementById('tabLogin').classList.remove('active');
            document.getElementById('panelRegister').classList.add('active');
            document.getElementById('panelLogin').classList.remove('active');
        });
        document.getElementById('clientLoginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var email = document.getElementById('cEmail').value.trim();
            var password = document.getElementById('cPassword').value;
            fetch(API_BASE + '/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password, portalType: 'client' })
            })
                .then(function (r) {
                    return r.json().then(function (data) {
                        if (!r.ok) throw data;
                        return data;
                    });
                })
                .then(function (data) {
                    sessionStorage.setItem('authToken', data.token);
                    sessionStorage.setItem('currentUser', JSON.stringify(data.user));
                    window.location.href = 'dashboard.html';
                })
                .catch(function (err) {
                    if (err && err.error === 'account_pending') {
                        alert(err.message || 'Your account is pending approval.');
                    } else {
                        alert((err && err.error) || 'Could not sign in.');
                    }
                });
        });
        document.getElementById('clientRegisterForm').addEventListener('submit', function (e) {
            e.preventDefault();
            var p1 = document.getElementById('rPassword').value;
            var p2 = document.getElementById('rPassword2').value;
            if (p1 !== p2) {
                alert('Passwords do not match.');
                return;
            }
            fetch(API_BASE + '/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('rName').value.trim(),
                    email: document.getElementById('rEmail').value.trim(),
                    password: p1
                })
            })
                .then(function (r) {
                    return r.json().then(function (data) {
                        if (!r.ok) throw new Error(data.error || 'Registration failed');
                        return data;
                    });
                })
                .then(function (data) {
                    alert(data.message || 'Registration submitted.');
                    document.getElementById('tabLogin').click();
                })
                .catch(function (err) {
                    alert(err.message || 'Could not register.');
                });
        });
    })();
    </script>
</body>
</html>
