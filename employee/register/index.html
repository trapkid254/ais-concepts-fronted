<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Registration | AIS Concepts</title>
    <link rel="stylesheet" href="../../style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-page { 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: var(--bg-secondary);
            padding: 20px;
        }
        .auth-wrap { max-width: 450px; width: 100%; }
        .auth-card { 
            background: var(--card-bg); 
            border-radius: 16px; 
            padding: 40px 30px; 
            box-shadow: 0 10px 30px var(--shadow); 
            border: 1px solid var(--border-color);
            text-align: center;
        }
        .auth-card h1 { 
            font-size: 1.5rem; 
            font-weight: 600; 
            margin-bottom: 10px; 
            color: var(--text-primary); 
        }
        .auth-card .sub { 
            color: var(--text-tertiary); 
            font-size: 0.9rem; 
            margin-bottom: 30px; 
        }
        .form-group { 
            margin-bottom: 20px; 
            text-align: left; 
        }
        .form-group label { 
            display: block; 
            font-size: 0.85rem; 
            color: var(--text-secondary); 
            margin-bottom: 8px; 
            font-weight: 500;
        }
        .form-group input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px; 
            font-size: 1rem; 
            background: var(--bg-primary); 
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }
        .form-group input:focus {
            outline: none;
            border-color: #0f766e;
        }
        .btn-auth { 
            width: 100%; 
            padding: 14px; 
            background: #0f766e; 
            color: #fff; 
            border: none; 
            border-radius: 8px; 
            font-weight: 600; 
            cursor: pointer; 
            margin-top: 10px;
            transition: background 0.3s ease;
        }
        .btn-auth:hover { 
            background: #0d9488; 
        }
        .login-link {
            display: block;
            margin-top: 20px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .login-link a {
            color: #0f766e;
            text-decoration: none;
            font-weight: 500;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        
        @media (max-width: 480px) {
            .auth-card { 
                padding: 30px 20px; 
                margin: 0 10px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-wrap">
            <div class="auth-card">
                <h1>Employee Registration</h1>
                <p class="sub">Create your employee account</p>
                
                <form id="employeeRegisterForm">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required autocomplete="name" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required autocomplete="tel" placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label for="employeeId">Employee ID</label>
                        <input type="text" id="employeeId" name="employeeId" required placeholder="Enter your employee ID">
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required autocomplete="new-password" placeholder="Create a password">
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password" placeholder="Confirm your password">
                    </div>
                    <button type="submit" class="btn-auth">Register</button>
                </form>
                
                <div class="login-link">
                    Already have an account? <a href="../login/">Login here</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../../api-config.js"></script>
    <script src="../../api-client.js"></script>
    <script>
        (function() {
            const form = document.getElementById('employeeRegisterForm');
            const API_BASE = window.API_BASE || '';
            
            form.addEventListener('submit', async function(e) {
                e.preventDefault();
                
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                
                if (password !== confirmPassword) {
                    alert('Passwords do not match');
                    return;
                }
                
                const formData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    phone: document.getElementById('phone').value,
                    username: document.getElementById('employeeId').value,
                    password: password,
                    role: 'employee'
                };
                
                try {
                    const response = await fetch(`${API_BASE}/api/auth/register-employee`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(formData)
                    });
                    
                    const result = await response.json();
                    
                    if (response.ok) {
                        alert('Registration successful! Please login to continue.');
                        window.location.href = '../login/';
                    } else {
                        alert(result.error || 'Registration failed. Please try again.');
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    alert('Registration failed. Please try again.');
                }
            });
        })();
    </script>
</body>
</html>
